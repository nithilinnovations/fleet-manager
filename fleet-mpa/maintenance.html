<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Fleet Manager — Maintenance</title>
<meta name="theme-color" content="#14171C" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />

<body>
<div id="app">
  <section class="screen active">
    <div class="topbar">
      <div><h1>Maintenance</h1><div class="sub" id="topSub">Service records & schedule</div></div>
      <button class="icon-btn" id="themeToggle">🌙</button>
    </div>

    <div class="tabs" id="mTabs">
      <button data-t="dashboard" class="active">📊 Dashboard</button>
      <button data-t="entry">➕ Service Entry</button>
      <button data-t="schedule">🗓 Schedule</button>
      <button data-t="reports">📑 Reports</button>
    </div>

    <div id="tabBody"></div>
  </section>

  <nav class="bottom-nav">
    <button class="nav-btn" data-page="index.html" onclick="location.href='index.html'"><span class="ic">🏠</span>Home</button>
    <button class="nav-btn" data-page="vehicles.html" onclick="location.href='vehicles.html'"><span class="ic">🚗</span>Vehicles</button>
    <button class="nav-btn" data-page="fuel.html" onclick="location.href='fuel.html'"><span class="ic">⛽</span>Fuel / Charging</button>
    <button class="nav-btn" data-page="maintenance.html" onclick="location.href='maintenance.html'"><span class="ic">🔧</span>Maintenance</button>
    <button class="nav-btn" data-page="documents.html" onclick="location.href='documents.html'"><span class="ic">📄</span>Documents</button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script src="js/common.js"></script>
<script src="js/vehicle-api.js"></script>
<script src="js/maintenance-api.js"></script>
<script src="js/schedule-api.js"></script>
<script>
initPage('maintenance.html');
let activeTab = 'dashboard';
const preselectVehicle = qs('vehicle');
if(preselectVehicle){ activeTab = 'entry'; }

$$('#mTabs button').forEach(b => b.onclick = () => {
  activeTab = b.dataset.t;
  $$('#mTabs button').forEach(x=>x.classList.toggle('active', x===b));
  renderTab();
});
$$('#mTabs button').forEach(x=>x.classList.toggle('active', x.dataset.t===activeTab));

function renderTab(){
  if(activeTab==='dashboard') renderDashboardTab();
  else if(activeTab==='entry') renderEntryTab();
  else if(activeTab==='schedule') renderScheduleTab();
  else if(activeTab==='reports') renderReportsTab();
}

/* ============================== DASHBOARD TAB ============================== */
function renderDashboardTab(){
  const vehicles = DB.vehicles.all();
  let upcoming = [], overdue = [];
  vehicles.forEach(v => categoriesFor(v).forEach(cat => {
    const st = computeScheduleStatus(v, cat);
    if(st.status==='Overdue') overdue.push({v, cat, st});
    else if(st.status==='Due Soon') upcoming.push({v, cat, st});
  }));
  const recentCompleted = DB.maint.all().slice(0,6);

  const scheduleLine = (item) => {
    const bits = [];
    if(item.st.remainingKm!=null) bits.push(item.st.remainingKm<0 ? `${Math.abs(item.st.remainingKm)} km overdue` : `${item.st.remainingKm} km left`);
    if(item.st.remainingDays!=null) bits.push(item.st.remainingDays<0 ? `${Math.abs(item.st.remainingDays)}d overdue` : `${item.st.remainingDays}d left`);
    return `<div class="alert-row"><span class="alert-dot ${scheduleStatusLevel(item.st.status)}"></span>
      <div><div style="font-size:13.5px;font-weight:600;">${esc(item.v.name)} — ${esc(item.cat)}</div><div style="font-size:12px;color:var(--text-dim);">${bits.join(' · ')||item.st.status}</div></div></div>`;
  };

  const health = vehicles.map(v => {
    const statuses = categoriesFor(v).map(cat => computeScheduleStatus(v, cat).status).filter(s=>s!=='Not Set');
    const onTime = statuses.filter(s=>s==='On Time').length;
    const pct = statuses.length ? Math.round(onTime/statuses.length*100) : null;
    const level = pct==null ? 'neutral' : pct>=80 ? 'green' : pct>=50 ? 'orange' : 'red';
    return `<div class="list-row"><div class="main"><div class="title">${esc(v.name)}</div><div class="meta">${statuses.length} categories tracked</div></div>
      <span class="chip ${level}">${pct==null?'No data':pct+'% healthy'}</span></div>`;
  }).join('');

  $('#tabBody').innerHTML = `
    
    <div class="card"><div class="card-title">Upcoming Services <small>${upcoming.length}</small></div>
      ${upcoming.length ? upcoming.map(scheduleLine).join('') : `<div class="empty" style="padding:10px;">Nothing due soon.</div>`}</div>
    <div class="card"><div class="card-title">Recently Completed</div>
      ${recentCompleted.length ? recentCompleted.map(m=>{ const v=DB.vehicles.get(m.vehicleId);
        return `<div class="list-row"><div class="main"><div class="title">${esc(m.category)} — ${esc(v?v.name:'—')}</div><div class="meta">${fmtDate(m.date)} · ${m.odometer} km</div></div><div class="amt">${fmtMoney(m.cost)}</div></div>`; }).join('')
        : `<div class="empty" style="padding:10px;">No service records yet.</div>`}</div>
   
  `;
}

/* ============================== SERVICE ENTRY TAB ============================== */
async function renderEntryTab(){
  
  $('#tabBody').innerHTML = `
    <div class="card">
      <div class="card-title">Add Maintenance Record</div>
      <div class="field">
    <label>Vehicle</label>
    <select id="mVehicle"></select>
</div>
      <div class="field"><label>Maintenance Category</label><select id="mCat"></select></div>
      <div class="field"><label>Date</label><input id="mDate" type="date" value="${todayISO()}"></div>
      <div class="grid2">

  <div class="field">
      <label>Starting Odometer (km)</label>
      <input id="mStartOdo" type="number">
  </div>

  <div class="field">
      <label>Ending Odometer (km)</label>
      <input id="mEndOdo" type="number">
  </div>

</div>
      <div class="field"><label>Vendor</label><input id="mVendor"></div>
      <div class="field"><label>Cost (₹)</label><input id="mCost" type="number"></div>
      
      <div class="field"><label>Remarks</label><textarea id="mRemarks"></textarea></div>
      <button class="btn mt8" id="saveMaintBtn">Save Maintenance Record</button>
    </div>
    <div class="card"><div class="card-title">Recent Entries</div><div id="recentEntryList"></div></div>
  `;
  const vehicleRes = await getVehicles();

if (!vehicleRes.success) {
    toast("Failed to load vehicles");
    return;
}

const vehicles = vehicleRes.data;

if (vehicles.length === 0) {
    $('#tabBody').innerHTML = `
        <div class="empty">
            <div class="ic">🚗</div>
            No vehicles found.
        </div>
    `;
    return;
}

$('#mVehicle').innerHTML = vehicles.map(v => `
    <option value="${v.id}">
        ${v.name} (${v.regNo})
    </option>
`).join('');

  const vSel = $('#mVehicle'), catSel = $('#mCat');
  const refreshCategories = () => {

    const v = vehicles.find(x => x.id === vSel.value);

    if (!v) return;

    catSel.innerHTML = categoriesFor(v)
        .map(c => `<option>${c}</option>`)
        .join('');
};
  const applyOdo = () => {
    $('#mStartOdo').value = "";
    $('#mEndOdo').value = "";

    refreshCategories();
};
  vSel.onchange = applyOdo; applyOdo();

  const renderRecent = async() => {
    const res = await getMaintenance();

if (!res.success) {
    $('#recentEntryList').innerHTML =
        `<div class="empty" style="padding:10px;">Failed to load records.</div>`;
    return;
}

const list = res.data.slice(0,8);
    $('#recentEntryList').innerHTML = list.length ? list.map(m=>{
      const v = DB.vehicles.get(m.vehicleId);
      const statusChip = m.approvalStatus ? `<span class="chip ${m.approvalStatus==='Approved'||m.approvalStatus==='Completed'?'green':m.approvalStatus==='Rejected'?'red':'orange'}">${m.approvalStatus}</span>` : '';
      return `<div class="list-row"><div class="main"><div class="title">${esc(m.category)} — ${esc(v?v.name:'—')}</div><div class="meta">${fmtDate(m.date)} · ${m.odometer} km · ${esc(m.vendor||'')}</div></div>
        <div style="text-align:right;">${statusChip}<div class="amt">${fmtMoney(m.cost)}</div></div></div>`;
    }).join('') : `<div class="empty" style="padding:10px;">No records yet.</div>`;
  };
  renderRecent();

  $('#saveMaintBtn').onclick = async() => {

    const cost = Number($('#mCost').value) || 0;

    const category = catSel.value;
    const date = $('#mDate').value;

    const startOdo = Number($('#mStartOdo').value) || 0;
    const endOdo = Number($('#mEndOdo').value) || 0;

    if (endOdo < startOdo) {
        toast("Ending Odometer cannot be less than Starting Odometer");
        return;
    }

    const m = {
        id: uid(),
        category,
        date,
        vehicleId: vSel.value,

        startOdometer: startOdo,
        endOdometer: endOdo,
        odometer: endOdo,

        vendor: $('#mVendor').value,
        cost,
        remarks: $('#mRemarks').value
    };

    const result = await addMaintenance(m);

if (!result.success) {
    toast("Failed to save maintenance");
    return;
}

toast("Maintenance record saved");

renderEntryTab();
};
}

/* ============================== SCHEDULE TAB ============================== */
async function renderScheduleTab() {

    const vehicleRes = await getVehicles();

    if (!vehicleRes.success) {
        toast("Failed to load vehicles");
        return;
    }

    const vehicles = vehicleRes.data;
    const scheduleRes = await getSchedule();
const schedules = scheduleRes.success ? scheduleRes.data : [];

    if (!vehicles.length) {
        $("#tabBody").innerHTML = `
            <div class="empty">
                <div class="ic">🗓</div>
                Add a vehicle first from Vehicles.
            </div>
        `;
        return;
    }

    $("#tabBody").innerHTML = `
        <div class="field">
            <label>Vehicle</label>

            <select id="schVehicle">
                ${vehicles.map(v => `
                    <option value="${v.id}">
                        ${v.name} (${v.regNo})
                    </option>
                `).join("")}
            </select>
        </div>

        <div class="card">
            <div id="schRows"></div>
        </div>
    `;

    const vSel = $("#schVehicle");

    function draw() {

        const v = vehicles.find(x => x.id === vSel.value);

        if (!v) return;

        const rows = categoriesFor(v).map(cat => {

            const record = schedules.find(s =>
    s.vehicleId === v.id &&
    s.category === cat
);

const def = DEFAULT_INTERVALS[cat] || { km: 0, days: 0 };

const st = {
    lastDate: record?.lastDate || "",
    lastOdo: record?.lastOdo || "",
    intervalKm: record?.intervalKm || def.km,
    intervalDays: record?.intervalDays || def.days,
    status: record ? "On Time" : "Not Set",
    remainingKm: null,
    remainingDays: null
};

            return `
                <div class="sched-row">

                    <div class="sched-row-head"
                         data-cat="${esc(cat)}">

                        <div>

                            <div class="name">
                                ${esc(cat)}
                            </div>

                            <div class="sched-stat">
                                Last:
                                ${st.lastDate ? fmtDate(st.lastDate) : "—"}
                                ${st.lastOdo ? " · " + st.lastOdo + " km" : ""}
                            </div>

                        </div>

                        <span class="chip ${scheduleStatusLevel(st.status)}">

                            ${st.status}

                            ${st.remainingKm != null ? " · " + st.remainingKm + " km" : ""}

                            ${st.remainingDays != null ? " · " + st.remainingDays + " d" : ""}

                        </span>

                    </div>

                    <div class="sched-row-body"
                         id="body-${btoa(encodeURIComponent(cat)).replace(/=/g,"")}">
                    </div>

                </div>
            `;

        }).join("");

        $("#schRows").innerHTML = rows;

        $$(".sched-row-head").forEach(h => {

            h.onclick = () => toggleSchedRow(
                vehicles,
                vSel.value,
                h.dataset.cat
            );

        });

    }

    vSel.onchange = draw;

    draw();

}
function schedBodyId(cat) {
    return "body-" + btoa(encodeURIComponent(cat)).replace(/=/g, "");
}

async function toggleSchedRow(vehicles, vid, cat) {

    const body = document.getElementById(schedBodyId(cat));

    const isOpen = body.classList.contains("open");

    $$(".sched-row-body.open").forEach(b => b.classList.remove("open"));

    if (isOpen) return;

    const v = vehicles.find(x => x.id === vid);

    if (!v) return;

    let sch = {};

const scheduleRes = await getSchedule();

if (scheduleRes.success) {

    const record = scheduleRes.data.find(s =>
        s.vehicleId === vid &&
        s.category === cat
    );
console.log("Record Found:", record);
    if (record) {

        sch = {
            lastDate: record.lastDate || "",
            lastOdo: record.lastOdo || "",
            intervalKm: record.intervalKm || "",
            intervalDays: record.intervalDays || ""
        };

    }

}

    const def = DEFAULT_INTERVALS[cat] || {
        km: 0,
        days: 0
    };

    body.innerHTML = `
        <div class="grid2">

            <div class="field">
                <label>Last Service Date</label>
                <input
                    type="date"
                    id="sLastDate"
                    value="${sch.lastDate || ""}">
            </div>

            <div class="field">
                <label>Last Service KM</label>
                <input
                    type="number"
                    id="sLastOdo"
                    value="${sch.lastOdo || ""}">
            </div>

            <div class="field">
                <label>Interval (km)</label>
                <input
                    type="number"
                    id="sIntKm"
                    value="${sch.intervalKm || def.km}">
            </div>

            <div class="field">
                <label>Interval (days)</label>
                <input
                    type="number"
                    id="sIntDays"
                    value="${sch.intervalDays || def.days}">
            </div>

        </div>

        <button class="btn secondary sm" id="sSaveBtn">
            Save Schedule
        </button>
    `;

    body.classList.add("open");
    console.log("Last Date =", document.getElementById("sLastDate").value);
console.log("Last Odo =", document.getElementById("sLastOdo").value);
console.log("Interval KM =", document.getElementById("sIntKm").value);
console.log("Interval Days =", document.getElementById("sIntDays").value);
    $("#sSaveBtn", body).onclick = async () => {

    const data = {

        vehicleId: vid,
        category: cat,

        lastDate: $("#sLastDate", body).value,

        lastOdo: Number($("#sLastOdo", body).value) || 0,

        intervalKm: Number($("#sIntKm", body).value) || 0,

        intervalDays: Number($("#sIntDays", body).value) || 0

    };

    const res = await addSchedule(data);

    if (res.success) {

        toast("Schedule Saved");

        renderScheduleTab();

    } else {

        toast("Failed to Save");

    }

};
}
/* ============================== REPORTS TAB ============================== */
const REPORTS = [
  { id:'vehicle', label:'Vehicle-wise Maintenance', gen: () => {
    const rows = DB.vehicles.all().map(v=>{ const recs = DB.maint.byVehicle(v.id);
      return [v.name, v.regNo, recs.length, fmtMoney(recs.reduce((s,r)=>s+(Number(r.cost)||0),0)), recs[0]?fmtDate(recs[0].date):'—']; });
    return { columns:['Vehicle','Reg No','Records','Total Cost','Last Service'], rows }; } },
  { id:'monthly', label:'Monthly Maintenance', gen: () => {
    const byMonth = {}; DB.maint.all().forEach(m=>{ const k=m.date.slice(0,7); byMonth[k]=byMonth[k]||{count:0,cost:0}; byMonth[k].count++; byMonth[k].cost+=Number(m.cost)||0; });
    const rows = Object.keys(byMonth).sort().reverse().map(k=>[k, byMonth[k].count, fmtMoney(byMonth[k].cost)]);
    return { columns:['Month','Records','Total Cost'], rows }; } },
  { id:'history', label:'Service History', gen: () => {
    const rows = DB.maint.all().map(m=>{ const v=DB.vehicles.get(m.vehicleId); return [fmtDate(m.date), v?v.name:'—', m.category, m.odometer, m.vendor||'—', fmtMoney(m.cost)]; });
    return { columns:['Date','Vehicle','Category','Odometer','Vendor','Cost'], rows }; } },
  { id:'cost', label:'Cost Analysis (by Category)', gen: () => {
    const byCat = {}; DB.maint.all().forEach(m=>{ byCat[m.category]=(byCat[m.category]||0)+(Number(m.cost)||0); });
    const rows = Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([k,v])=>[k, fmtMoney(v)]);
    return { columns:['Category','Total Cost'], rows }; } },
  { id:'upcoming', label:'Upcoming Service', gen: () => {
    const rows = [];
    DB.vehicles.all().forEach(v => categoriesFor(v).forEach(cat=>{ const st=computeScheduleStatus(v,cat);
      if(st.status==='Due Soon') rows.push([v.name, cat, st.nextDueDate?fmtDate(st.nextDueDate):'—', st.nextDueKm||'—', st.remainingKm ?? '—', st.remainingDays ?? '—']); }));
    return { columns:['Vehicle','Category','Next Due Date','Next Due KM','KM Left','Days Left'], rows }; } },
  { id:'overdue', label:'Overdue Service', gen: () => {
    const rows = [];
    DB.vehicles.all().forEach(v => categoriesFor(v).forEach(cat=>{ const st=computeScheduleStatus(v,cat);
      if(st.status==='Overdue') rows.push([v.name, cat, st.nextDueDate?fmtDate(st.nextDueDate):'—', st.nextDueKm||'—', st.remainingKm ?? '—', st.remainingDays ?? '—']); }));
    return { columns:['Vehicle','Category','Was Due Date','Was Due KM','KM Overdue','Days Overdue'], rows }; } },
  { id:'oil', label:'Engine Oil History', gen: () => {
    const rows = DB.maint.all().filter(m=>m.category==='Engine Oil').map(m=>{ const v=DB.vehicles.get(m.vehicleId); return [fmtDate(m.date), v?v.name:'—', m.odometer, m.vendor||'—', fmtMoney(m.cost)]; });
    return { columns:['Date','Vehicle','Odometer','Vendor','Cost'], rows }; } },
  { id:'tyres', label:'Tyre Replacement History', gen: () => {
    const rows = DB.maint.all().filter(m=>m.category==='Tyres').map(m=>{ const v=DB.vehicles.get(m.vehicleId); return [fmtDate(m.date), v?v.name:'—', m.odometer, m.vendor||'—', fmtMoney(m.cost)]; });
    return { columns:['Date','Vehicle','Odometer','Vendor','Cost'], rows }; } },
  { id:'battery', label:'Battery Replacement History', gen: () => {
    const rows = DB.maint.all().filter(m=>m.category==='Battery').map(m=>{ const v=DB.vehicles.get(m.vehicleId); return [fmtDate(m.date), v?v.name:'—', m.odometer, m.vendor||'—', fmtMoney(m.cost)]; });
    return { columns:['Date','Vehicle','Odometer','Vendor','Cost'], rows }; } },
  { id:'insurance', label:'Insurance Renewal', gen: () => {
    const rows = DB.vehicles.all().map(v=>{ const s=reminderStatus(v.insurance?.expiryDate, v.insurance?.reminderDays||30);
      return [v.name, v.insurance?.company||'—', v.insurance?.policyNo||'—', v.insurance?.expiryDate?fmtDate(v.insurance.expiryDate):'—', s.label]; });
    return { columns:['Vehicle','Company','Policy No','Expiry','Status'], rows }; } },
  { id:'puc', label:'PUC (Smoke Test)', gen: () => {
    const rows = DB.vehicles.all().filter(v=>v.fuelType!=='Electric (EV)').map(v=>{ const s=reminderStatus(v.puc?.expiryDate, 15);
      return [v.name, v.puc?.issueDate?fmtDate(v.puc.issueDate):'—', v.puc?.expiryDate?fmtDate(v.puc.expiryDate):'—', s.label]; });
    return { columns:['Vehicle','Issue Date','Expiry','Status'], rows }; } },
  { id:'fc', label:'FC Renewal', gen: () => {
    const rows = DB.vehicles.all().map(v=>{ const s=reminderStatus(v.fc?.expiryDate, v.fc?.reminderDays||30);
      return [v.name, v.fc?.issueDate?fmtDate(v.fc.issueDate):'—', v.fc?.expiryDate?fmtDate(v.fc.expiryDate):'—', s.label]; });
    return { columns:['Vehicle','Issue Date','Expiry','Status'], rows }; } },
  { id:'expense', label:'Expense Report (All)', gen: () => {
    const rows = [];
    DB.fuel.all().forEach(f=>{ const v=DB.vehicles.get(f.vehicleId); rows.push([fmtDate(f.date), 'Fuel', v?v.name:'—', fmtMoney(f.cost)]); });
    DB.ev.all().forEach(e=>{ const v=DB.vehicles.get(e.vehicleId); rows.push([fmtDate(e.date), 'EV Charging', v?v.name:'—', fmtMoney(e.cost)]); });
    DB.maint.all().forEach(m=>{ const v=DB.vehicles.get(m.vehicleId); rows.push([fmtDate(m.date), m.category, v?v.name:'—', fmtMoney(m.cost)]); });
    rows.sort((a,b)=> new Date(b[0]) - new Date(a[0]));
    return { columns:['Date','Type','Vehicle','Cost'], rows }; } }
];

let currentReport = null;
function renderReportsTab(){
  $('#tabBody').innerHTML = `
    <div class="report-picker no-print" id="reportPicker"></div>
    <div class="card" id="reportOutput"><div class="empty" style="padding:10px;">Choose a report above.</div></div>
  `;
  $('#reportPicker').innerHTML = REPORTS.map(r=>`<button data-id="${r.id}">${r.label}</button>`).join('');
  $$('#reportPicker button').forEach(b => b.onclick = () => {
    $$('#reportPicker button').forEach(x=>x.classList.toggle('active', x===b));
    currentReport = REPORTS.find(r=>r.id===b.dataset.id);
    drawReport();
  });
}
function drawReport(){
  if(!currentReport) return;
  const { columns, rows } = currentReport.gen();
  const table = `<div class="report-table-wrap"><table class="report-table">
    <thead><tr>${columns.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead>
    <tbody>${rows.length ? rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('') : `<tr><td colspan="${columns.length}" style="color:var(--text-dim);">No data for this report yet.</td></tr>`}</tbody>
  </table></div>`;
  $('#reportOutput').innerHTML = `
    <div class="card-title">${currentReport.label} <small>${rows.length} row${rows.length!==1?'s':''}</small></div>
    ${table}
    <div class="btn-row mt16 no-print">
      <button class="btn secondary sm" id="exportCsvBtn">⬇ Export Excel (CSV)</button>
      <button class="btn secondary sm" id="printBtn">🖨 Print / Save PDF</button>
    </div>
  `;
  $('#exportCsvBtn').onclick = () => {
    const csvRows = [columns, ...rows];
    const csv = csvRows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${currentReport.id}-report.csv`; a.click();
  };
  $('#printBtn').onclick = () => window.print();
}

/* ============================== APPROVALS TAB ============================== */
function renderApprovalsTab(){
  const list = DB.maint.all().filter(m=>m.approvalStatus);
  const threshold = DB.settings.get().approvalThreshold || 5000;
  $('#tabBody').innerHTML = list.length ? `<div class="card">${list.map(m=>{
    const v = DB.vehicles.get(m.vehicleId);
    return `<div class="list-row">
      <div class="main"><div class="title">${esc(m.category)} — ${esc(v?v.name:'—')}</div><div class="meta">${fmtDate(m.date)} · ${fmtMoney(m.cost)}</div></div>
      <select data-id="${m.id}" class="approvalSelect" style="background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 8px;">
        ${['Pending','Approved','Rejected','Completed'].map(s=>`<option ${m.approvalStatus===s?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>`;
  }).join('')}</div>` : `<div class="empty"><div class="ic">✅</div>No approval requests. Records above ${fmtMoney(threshold)} appear here automatically.<br><span style="font-size:12px;">Change the threshold in Settings.</span></div>`;
  $$('.approvalSelect').forEach(sel => sel.onchange = () => {
    const m = DB.maint.all().find(x=>x.id===sel.dataset.id); if(!m) return;
    m.approvalStatus = sel.value; DB.maint.update(m); toast('Status updated');
  });
}

renderTab();
</script>
</body>
</html>
